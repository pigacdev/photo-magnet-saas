# Attach this config to the Railway web (Next.js) service
# (Settings → Config-as-code path), or set Dockerfile path to Dockerfile.web.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
