# Attach this config to the Railway API service (Settings → Config-as-code path),
# or set Dockerfile path to Dockerfile.api in the service settings.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
